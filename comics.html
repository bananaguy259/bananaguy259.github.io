<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comics — Bomb's Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #09090e;
      --surface:    #101017;
      --card:       rgba(255,255,255,0.035);
      --card-hover: rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.07);
      --border-h:   rgba(255,255,255,0.14);
      --red:        #b91c1c;
      --red-glow:   rgba(185,28,28,0.18);
      --gold:       #c9a84c;
      --gold-dim:   rgba(201,168,76,0.12);
      --text:       #e2e2e6;
      --muted:      #6b6b7a;
      --white:      #ffffff;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(9,9,14,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family:'Space Grotesk',sans-serif; font-size:1.05rem; font-weight:600; color:var(--white); text-decoration:none; }
    .nav-logo span { color:var(--gold); }
    .nav-link { font-family:'Space Grotesk',sans-serif; font-size:0.8rem; font-weight:500; color:var(--muted); text-decoration:none; transition:color 0.2s; display:flex; align-items:center; gap:4px; }
    .nav-link:hover { color:var(--white); }

    .page-header { padding:3.5rem 1.5rem 2rem; max-width:960px; margin:0 auto; }
    .header-tag { font-family:'Space Grotesk',sans-serif; font-size:0.65rem; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); margin-bottom:0.6rem; }
    .header-title { font-family:'Space Grotesk',sans-serif; font-size:clamp(2rem,6vw,3rem); font-weight:700; letter-spacing:-0.02em; color:var(--white); line-height:1.1; }
    .header-sub { font-size:0.88rem; color:var(--muted); margin-top:0.6rem; }

    .toolbar {
      max-width: 960px; margin: 0 auto;
      padding: 0 1.5rem 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .search-wrap { position: relative; }
    .search-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); }
    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: rgba(255,255,255,0.18); }
    .search-input::placeholder { color: var(--muted); }

    .filters { display:flex; gap:0.4rem; flex-wrap:wrap; }
    .filter-btn {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.72rem; font-weight:500;
      padding:0.28rem 0.85rem;
      border-radius:100px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      transition:all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { color:var(--white); border-color:rgba(255,255,255,0.2); }
    .filter-btn.active { background:var(--white); color:#09090e; border-color:var(--white); }

    .count-bar {
      max-width:960px; margin:0 auto;
      padding:0.5rem 1.5rem 1rem;
      font-family:'Space Grotesk',sans-serif;
      font-size:0.72rem; font-weight:500;
      color:var(--muted);
      border-bottom:1px solid var(--border);
    }

    .grid-wrap { max-width:960px; margin:0 auto; padding:1.5rem 1.5rem 5rem; }
    .comics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.9rem;
    }
    @media(max-width:360px){ .comics-grid{ grid-template-columns:repeat(2,1fr); } }

    .comic-card {
      display:flex; flex-direction:column;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
      text-decoration:none;
      transition:border-color 0.18s, transform 0.18s, background 0.18s;
    }
    .comic-card.clickable { cursor:pointer; }
    .comic-card.clickable:hover { border-color:var(--border-h); background:var(--card-hover); transform:translateY(-3px); }

    .cover-wrap { position:relative; aspect-ratio:2/3; background:#131320; overflow:hidden; }
    .cover-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
    .comic-card.clickable:hover .cover-img { transform:scale(1.04); }

    .cover-placeholder {
      width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.5rem;
      background:linear-gradient(150deg,#16162a 0%,#0e0e1a 100%);
    }
    .cover-placeholder svg { opacity:0.18; }
    .cover-placeholder span { font-family:'Space Grotesk',sans-serif; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); opacity:0.5; }

    .comic-info { padding:0.65rem 0.7rem 0.8rem; flex:1; }
    .comic-series {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.56rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.18rem;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .comic-title {
      font-family:'Space Grotesk',sans-serif;
      font-size:0.76rem; font-weight:600; color:var(--white); line-height:1.3; margin-bottom:0.22rem;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .comic-meta { font-size:0.66rem; color:var(--muted); }

    .no-results { text-align:center; padding:5rem 1.5rem; color:var(--muted); font-family:'Space Grotesk',sans-serif; font-size:0.9rem; display:none; }

    footer { padding:2rem 1.5rem; border-top:1px solid var(--border); display:flex; flex-direction:column; align-items:center; gap:0.5rem; text-align:center; }
    .footer-logo { font-family:'Space Grotesk',sans-serif; font-size:0.9rem; font-weight:600; color:var(--white); }
    .footer-logo span { color:var(--gold); }
    .footer-legal { font-size:0.72rem; color:var(--muted); opacity:0.5; }
  </style>
</head>

    // ── RENDER ENGINE ────────────────────────────────────────────────────
    function fileUrl(path) {
  if (path.startsWith('http')) return path;
  return path.split('/').map(encodeURIComponent).join('/');
    }

    const grid      = document.getElementById('grid');
    const noResults = document.getElementById('no-results');
    const searchEl  = document.getElementById('search');
    const filterBar = document.getElementById('filter-bar');
    const countBar  = document.getElementById('count-bar');

    let activeFilter = 'All';

    // Build filter buttons from unique series names
    const allSeries = ['All', ...new Set(COMICS.map(c => c.series))];
    allSeries.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (s === 'All' ? ' active' : '');
      btn.textContent = s === 'All' ? 'All (' + COMICS.length + ')' : s;
      btn.addEventListener('click', () => {
        activeFilter = s;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      filterBar.appendChild(btn);
    });

    const placeholderHTML = `<div class="cover-placeholder">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>No cover</span>
    </div>`;

    function render() {
      const q = searchEl.value.trim().toLowerCase();
      const filtered = COMICS.filter(c => {
        const matchesSeries = activeFilter === 'All' || c.series === activeFilter;
        const matchesSearch = !q || (c.title + ' ' + c.series + ' ' + c.issue).toLowerCase().includes(q);
        return matchesSeries && matchesSearch;
      });

      grid.innerHTML = '';
      noResults.style.display = filtered.length === 0 ? 'block' : 'none';

      const n = filtered.length;
      countBar.textContent = n === 0 ? 'No results' : n + ' issue' + (n !== 1 ? 's' : '');

      filtered.forEach(comic => {
        const hasFile = !!comic.file;
        const card = document.createElement(hasFile ? 'a' : 'div');
        card.className = 'comic-card' + (hasFile ? ' clickable' : '');
        if (hasFile) {
          card.href   = fileUrl(comic.file);
          card.target = '_blank';
          card.rel    = 'noopener';
        }

        const coverWrap = document.createElement('div');
        coverWrap.className = 'cover-wrap';

        if (comic.cover) {
          const img = document.createElement('img');
          img.className   = 'cover-img';
          img.alt         = comic.title + (comic.issue ? ' ' + comic.issue : '');
          img.loading     = 'lazy';
          img.src         = comic.cover;
          img.onerror     = () => { coverWrap.innerHTML = placeholderHTML; };
          coverWrap.appendChild(img);
        } else {
          coverWrap.innerHTML = placeholderHTML;
        }

        const info = document.createElement('div');
        info.className = 'comic-info';
        info.innerHTML = `
          <div class="comic-series">${comic.series}</div>
          <div class="comic-title">${comic.title}</div>
          <div class="comic-meta">${[comic.issue, comic.year].filter(Boolean).join(' &middot; ')}</div>
        `;

        card.appendChild(coverWrap);
        card.appendChild(info);
        grid.appendChild(card);
      });
    }

    searchEl.addEventListener('input', render);
    render();
  </script>
